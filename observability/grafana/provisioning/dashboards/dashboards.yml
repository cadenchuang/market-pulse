# Tells Grafana to load dashboard JSON from a folder on disk (provisioned as
# code). The JSON lives in /var/lib/grafana/dashboards (mounted in compose).
apiVersion: 1

providers:
  - name: market-pulse
    orgId: 1
    folder: Market Pulse
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
