# Market Pulse — Phase 2 stack: Kafka (KRaft) + Go replay ingestion.
# `docker compose up` streams the bundled synthetic dataset to news.raw offline,
# with zero API keys. Later phases add the Go processor, Python inference, DB,
# Prometheus/Grafana, and the Streamlit dashboard to this same file.

services:
  # Single-node Kafka in KRaft mode (no ZooKeeper).
  kafka:
    image: apache/kafka:3.8.0
    container_name: market-pulse-kafka
    ports:
      - "29092:29092" # host access (localhost:29092); in-network clients use kafka:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 20

  # Create partitioned topics once the broker is healthy, then exit.
  kafka-init:
    image: apache/kafka:3.8.0
    container_name: market-pulse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        kt=/opt/kafka/bin/kafka-topics.sh
        $$kt --bootstrap-server kafka:9092 --create --if-not-exists --topic news.raw       --partitions 3 --replication-factor 1
        $$kt --bootstrap-server kafka:9092 --create --if-not-exists --topic news.processed --partitions 3 --replication-factor 1
        echo "topics ready:"
        $$kt --bootstrap-server kafka:9092 --list

  # Go ingestion service: replay dataset -> news.raw.
  ingestor:
    build:
      context: .
      dockerfile: ingestor/Dockerfile
    image: market-pulse/ingestor:latest
    container_name: market-pulse-ingestor
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW: news.raw
      INGEST_MODE: replay
      REPLAY_PATH: /app/data/sample/news_sample.jsonl
      REPLAY_RATE_PER_SEC: "50"
      METRICS_PORT_INGESTOR: "9101"
    ports:
      - "9101:9101" # Prometheus /metrics (produce throughput + errors + memory)
    volumes:
      - ./data:/app/data:ro
    entrypoint: ["/ingestor"]
    command: ["-loop"] # keep the demo stream flowing; remove for a single pass

  # Go processing consumer group: news.raw -> dedup/normalize/filter -> news.processed.
  # Reuses the same image; selects the processor binary via entrypoint.
  processor:
    image: market-pulse/ingestor:latest
    build:
      context: .
      dockerfile: ingestor/Dockerfile
    container_name: market-pulse-processor
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW: news.raw
      KAFKA_TOPIC_PROCESSED: news.processed
      KAFKA_CONSUMER_GROUP_PROCESSOR: market-pulse-processor
      METRICS_PORT_PROCESSOR: "9102"
    ports:
      - "9102:9102" # Prometheus /metrics (throughput + consumer lag)
    entrypoint: ["/processor"]

  # Python inference consumer group: news.processed -> INT8 FinBERT (ONNX) ->
  # sentiment + entities. N worker PROCESSES (not threads; see inference/README).
  # Falls back to a heuristic model if no exported ONNX model is present, so the
  # default `docker compose up` runs fully offline.
  inference:
    build:
      context: .
      dockerfile: inference/Dockerfile
      # Set to "true" to export + quantize FinBERT at build time (needs network).
      args:
        EXPORT_MODEL: "false"
    container_name: market-pulse-inference
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PROCESSED: news.processed
      KAFKA_CONSUMER_GROUP_INFERENCE: market-pulse-inference
      INFERENCE_WORKERS: "3" # match the news.processed partition count
      ONNX_MODEL_DIR: /app/inference/models/finbert-onnx
      QUANTIZE_INT8: "true"
      METRICS_PORT_INFERENCE: "9103"
      DATABASE_URL: sqlite:////data/market_pulse.db # shared volume so the dashboard can read it
    ports:
      - "9103-9105:9103-9105" # one /metrics port per worker (base + index)
    volumes:
      - ./inference/models:/app/inference/models # persist an exported model
      - db-data:/data # shared SQLite DB (results + shocks), read by the dashboard

  # Prometheus: scrapes both Go stages and every Python worker. Config is
  # provisioned as code from observability/prometheus.yml.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: market-pulse-prometheus
    depends_on:
      - ingestor
      - processor
      - inference
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=6h

  # Grafana: datasource + dashboards provisioned as code. Open http://localhost:3000
  # (anonymous viewer enabled; default admin/admin for editing).
  grafana:
    image: grafana/grafana:11.2.0
    container_name: market-pulse-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

  # Phase 7 --stress load generator. Off by default; start with:
  #   docker compose --profile stress up loadtest
  # Floods news.raw with unique synthetic items to watch lag/memory climb.
  loadtest:
    image: market-pulse/ingestor:latest
    build:
      context: .
      dockerfile: ingestor/Dockerfile
    container_name: market-pulse-loadtest
    profiles: ["stress"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_RAW: news.raw
      METRICS_PORT_LOADTEST: "9106"
    ports:
      - "9106:9106" # Prometheus /metrics (flood throughput)
    entrypoint: ["/loadtest"]
    command: ["-workers", "16", "-rate", "0", "-duration", "120s"] # unlimited flood for 2m

  # Streamlit dashboard: sentiment over time, flagged shocks, and live pipeline
  # metrics. Reads the shared SQLite DB the inference workers write, and queries
  # Prometheus for live throughput/lag. Open http://localhost:8501.
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: market-pulse/dashboard:latest
    container_name: market-pulse-dashboard
    depends_on:
      - inference
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: sqlite:////data/market_pulse.db
      PROMETHEUS_URL: http://prometheus:9090
    volumes:
      - db-data:/data:ro # read-only view of the results DB

volumes:
  prometheus-data:
  grafana-data:
  db-data:
